{{- if not .Values.existingSecret }}
{{- if not .Values.config.secretKey }}
{{- fail "config.secretKey is required (openssl rand -base64 32), or set existingSecret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "cityhall.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "cityhall.databaseUrl" . | quote }}
  CITYHALL_SECRET_KEY: {{ .Values.config.secretKey | quote }}
  CITYHALL_BASE_URL: {{ .Values.config.baseUrl | quote }}
{{- end }}
