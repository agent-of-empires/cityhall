# nginx TLS termination for CityHall on a single host (systemd or Docker).
# Get a certificate with: certbot --nginx -d cityhall.example.com
# Assumes CityHall listens on 127.0.0.1:3000 (BIND_ADDR).

server {
    listen 80;
    listen [::]:80;
    server_name cityhall.example.com;
    # Redirect all HTTP to HTTPS (certbot manages the ACME challenge location).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cityhall.example.com;

    ssl_certificate     /etc/letsencrypt/live/cityhall.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cityhall.example.com/privkey.pem;

    # Allow reasonably large request bodies (avatars, imports later on).
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through upgrades for any future WebSocket endpoints.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
    }
}

# Maps a present Upgrade header to "upgrade", else "close".
map $http_upgrade $http_connection {
    default upgrade;
    ''      close;
}
