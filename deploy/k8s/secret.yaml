# Edit these values before applying. For real deployments use a secret manager
# (Sealed Secrets, SOPS, External Secrets) instead of committing this file.
apiVersion: v1
kind: Secret
metadata:
  name: cityhall
  namespace: cityhall
type: Opaque
stringData:
  # Postgres password (must match postgres.yaml).
  DB_PASSWORD: change-me-to-a-strong-password
  # Full connection string handed to CityHall.
  DATABASE_URL: postgres://cityhall:change-me-to-a-strong-password@cityhall-db:5432/cityhall
  # Encrypts stored SMTP/OIDC secrets. Generate once: openssl rand -base64 32
  CITYHALL_SECRET_KEY: change-me-base64-32-bytes
  # Public URL (matches the Ingress host).
  CITYHALL_BASE_URL: https://cityhall.example.com
