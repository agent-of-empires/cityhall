# Local stack for developing and testing CityHall, including email flows.
#
#   docker compose up --build
#
# Then open http://localhost:3000 (the admin password is printed in the
# `cityhall` logs on first launch). SMTP is pre-configured via environment
# variables to point at the bundled Mailpit instance, so email works out of the
# box; view captured mail at http://localhost:8025. Because it is env-managed,
# the Settings form is read-only. To exercise the settings-page path instead,
# comment out the SMTP_* variables below and configure SMTP in the UI (host
# `mailpit`, port `1025`, encryption `none`).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cityhall
      POSTGRES_PASSWORD: cityhall
      POSTGRES_DB: cityhall
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityhall"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  cityhall:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cityhall:cityhall@db:5432/cityhall
      BIND_ADDR: 0.0.0.0:3000
      # Required to store the SMTP password set via the settings page.
      # Dev-only value; generate your own with: openssl rand -base64 32
      CITYHALL_SECRET_KEY: "ZGV2LW9ubHkta2V5LTMyLWJ5dGVzLWxvbmchISEhISE="
      # SMTP pre-configured to point at the bundled Mailpit (env-managed, so the
      # settings form is read-only). Comment these out to configure SMTP in the
      # UI instead.
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_ENCRYPTION: none
      SMTP_FROM_ADDRESS: cityhall@example.com
      SMTP_FROM_NAME: CityHall
      # OIDC SSO is off by default. To enable it env-managed, set your provider's
      # details here (or leave these unset and configure SSO in the settings UI).
      # Register http://localhost:3000/api/auth/oidc/callback with the provider.
      # OIDC_ISSUER: https://accounts.example.com
      # OIDC_CLIENT_ID: cityhall
      # OIDC_CLIENT_SECRET: your-client-secret
      # OIDC_ALLOWED_DOMAINS: example.com
    ports:
      - "3000:3000"

volumes:
  pgdata:
