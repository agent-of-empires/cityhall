name: PR Title Check

# Enforce Conventional Commits on the PR title. We squash-merge PRs, so the
# PR title becomes the commit subject.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            security
            revert
            chore
            build
            ci
            docs
            style
            refactor
            test
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with a lowercase character (Conventional Commits style).
